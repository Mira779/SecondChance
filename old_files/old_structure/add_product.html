{% extends 'base.html' %}

{% block title %}Add Product{% endblock %}

{% block content %}
    <h1>Add Product</h1>
    
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <label>Product Name:</label>
        <input type="text" name="name" required>

        <label>Category:</label>
        <input type="text" name="category" required>

        <label>Buy Price:</label>
        <input type="number" min="1" step="1" name="buy_price" required>

        <label>Sell Price:</label>
        <input type="number" min="1" step="1" name="sell_price" required>

        <label>Quantity:</label>
        <input type="number" name="quantity" required>

        <label>Low Stock Limit:</label>
        <input type="number" name="low_stock_limit" value="5" required>

        <button class="btn btn-green" type="submit">Save Product</button>
    </form>
{% endblock %}
