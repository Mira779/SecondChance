{% extends 'base.html' %}

{% block title %}Edit Product{% endblock %}

{% block content %}
    <h1>Edit Product</h1>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
    <div class="code-box">
        <strong>Item Code:</strong> {{ product.item_code }}
    </div>

    <form method="POST">
        <label>Product Name:</label>
        <input type="text" name="name" value="{{ product.name }}" required>

        <label>Category:</label>
        <input type="text" name="category" value="{{ product.category }}" required>

        <label>Buy Price:</label>
        <input type="number" min="1" step="1" name="buy_price" value="{{ product.buy_price }}" required>

        <label>Sell Price:</label>
        <input type="number" min="1" step="1" name="sell_price" value="{{ product.sell_price}}" required>

        <label>Quantity:</label>
        <input type="number" name="quantity" value="{{ product.quantity }}" default="1">

        <label>Low Stock Limit:</label>
        <input type="number" name="low_stock_limit" value="{{ product.low_stock_limit }}" required>

        <button class="btn btn-orange" type="submit">Update Product</button>
    </form>

{% endblock %}
