{% extends 'base.html' %}
{% block title %}Voucher System{% endblock %}
{% block content %}
<h2>Enter Weight(Viss)</h2>

<form method="POST" action="/voucher/create">
    <table border="1" cellpadding="8">
        <tr>
            <th>Size</th>
            <th>Weight</th>
            <th>Price</th>
            <th>Total</th>
        </tr>
    
        {% for size in sizes %}
        <tr>
            <td>{{ size.size_name }}</td>
            <input type="number" name="weight_{{ size.id }}" step="0.001" placeholder="Enter Weight">
            <td>{{ size.price }}</td>
            <td>{{ size.total }}</td>
        </tr>
        {% endfor %}
        <button onclick="sendData()">Generate Voucher</button>
    </table>
    <script>
        function sendData() {
            fetch('/voucher', {
                method: "POST"
            })
            .then(res => res.text())
            .then(data => {
                document.body.innerHTML = data;
            });
        }
    </script>
</form>
{% endblock %}
