{% extends 'base.html' %}
{% block title %}Voucher System{% endblock %}
{% block content %}

<form method="POST" action="{{ url_for('create_voucher')}}">
    <table>
        <tr>
            <th>Size</th>
            <th>Price</th>
            <th>Weight</th>
            <th>Subtotal</th>
        </tr>
        {% for size in sizes %}
        <tr>
            <td>{{ size.name }}</td>
            <td>
                class="price_{{ size.id }}">{{ size.price }}
            </td>
            <td>
                <input type="number" step="0.001" class="weight_{{ size.id }}" name="weight_{{ size.id }}">
            </td>
            <td>
                class="subtotal_{{ size.id }}">0
            </td>
        </tr>
        {% endfor %}
    </table>

    <h3>Total: <span class="total">0</span></h3>

    <button type="btn btn-green btn-small" onclick="claculate_voucher()">Calculate</button>
    <button type="btn">Purchase Vouchers</button>
</form>

{% endblock %}

<script>
function claculate_voucher() {
    let total = 0;
    let rows = document.querySelectorAll("table tr")
    rows.forEach((row, index) => { 
        if (index === 0) return; //skip header
        let price = parseFloat(row.querySelector(".price")?.innerText) || 0;
        let weight = parseFloat(row.querySelector(".weight")?.value) || 0;
        let subtotal = price * weight;
        row.querySelector(".subtotal").innerText = subtotal.toFixed(2);
        total += subtotal;
    });
docment.getElementById('total').innerText = total.toFixed(2);
}
</script>
