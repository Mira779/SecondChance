{% extends 'base.html' %}

{% block title %}Sell Product{% endblock %}

{% block content %}
<h1>Sell Product</h1>

<div class="code-box">
    <strong>{{ product.name }}</strong> ({{ product.item_code }})<br>
    Available Stock: {{ product.quantity }}
</div>

{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
    <p>Selling Price: {{ product.sell_price }}</p>

    <label>Quantity to Sell:</label>
    <input type="number" min="1" step="1" name="quantity" required>

    <button class="btn btn-red" type="submit">Sell</button>
</form>

{% endblock %}
