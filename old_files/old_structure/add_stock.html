{% extends 'base.html' %}

{% block title %}Add Stock{% endblock %}

{% block content %}
<h1>Add Stock</h1>

<div class="code-box">
    <strong>{{ p.name }}</strong> ({{ p.item_code }})<br>
    Current Quantity: {{ product.quantity }}
</div>

{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
    <label>Quantity to Add:</label>
    <input type="number" name="quantity" required>
    <button class="btn btn-green" type="submit">Add Stock</button>
</form>

{% endblock %}
