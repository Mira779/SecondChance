<form method="POST">

    {% for field in meta.fields %}

        <div class="mb-3">

            <label class="form-label">
                {{ field.label }}
            </label>

            <input
                type="{{ field.type }}"
                name="{{ field.name }}"
                class="form-control"

                value="{% if item %}{{ item[field.name] if item is mapping else item|attr(field.name) }}{% endif %}"

                {% if field.type == 'select' %}

                    <select
                        name="{{ field.name }}"
                        class="{{ field.class or 'form-select' }}"
                    >

                    {% for choice in field.choices %}

                        <option
                            value="{{ choice }}"
                            {% if item and item|attr(field.name) == choice %}
                                selected
                               {% endif %}
                        >

                            {{ choice }}

                        </option>

                    {% endfor %}

                    </select>

                {% endif %}

                {% if field.required %}
                    required
                {% endif %}
            >

        </div>

    {% endfor %}
    

    <button class="btn btn-primary">
        Save
    </button>

</form>
