<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Voucher System</title>

    <!-- Bootstrap CSS -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        body {
            background: #f5f6fa;
        }

        .sidebar {
            width: 250px;
            min-height: 100vh;
            background: #212529;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }

        .sidebar a:hover {
            background: #343a40;
        }

        .main-content {
            flex: 1;
            padding: 20px;
        }

        .card {
            border: none;
            border-radius: 12px;
        }

        .table th {
            background: #f1f3f5;
        }

    </style>

</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="p-3 text-white">

            <h4>Voucher System</h4>

        </div>

        <a href="{{ url_for('product.product_list') }}">
            <i class="bi bi-box"></i>
            Products
        </a>

        <!-- Voucher History -->
        <a href="{{ url_for('voucher.voucher_history') }}">
            <i class="bi bi-box"></i>
            Voucher history
        </a>

        <!-- Create voucher-->
        <a href="{{ url_for('voucher.create_voucher') }}">
            <i class="bi bi-box"></i>
            Generate voucher
        </a>
        <!-- ADD MORE MODULES LATER -->

        <!--
        <a href="#">
            Vouchers
        </a>

        <a href="#">
            Customers
        </a>
        -->

    </div>

    <!-- MAIN CONTENT -->

    <div class="main-content">

        <!-- FLASH MESSAGES -->

        {% with messages = get_flashed_messages(with_categories=true) %}

            {% if messages %}

                {% for category, message in messages %}

                    <div class="alert alert-{{ category }}
                                alert-dismissible fade show">

                        {{ message }}

                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="alert">
                        </button>

                    </div>

                {% endfor %}

            {% endif %}

        {% endwith %}

        <!-- PAGE CONTENT -->

        {% block content %}
        {% endblock %}

    </div>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>

</html>
